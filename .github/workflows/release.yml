name: Release

# On every push to main, Changesets either opens/updates a "Version Packages" PR
# (when unreleased changesets exist) or, once that PR is merged, publishes the bumped
# packages to npm, tags them, and creates GitHub releases.
on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create git tags + GitHub releases, and push the Version Packages PR
  pull-requests: write # open/update the Version Packages PR
  id-token: write # npm provenance via OIDC

jobs:
  release:
    name: version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changesets needs full history to diff against baseBranch

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      # Gate the release on a green build so we never publish broken packages.
      - run: pnpm -r typecheck
      - run: pnpm -r test

      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Trusted publishing (OIDC) is preferred and needs no token — configure the
          # package's trusted publisher on npmjs.com. If not using OIDC, provide an npm
          # automation token as the NPM_TOKEN secret (used below).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
